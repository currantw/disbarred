<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #0860ca;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #28a745;
    }
  </style>
</head>
<body>
  <h2>Disbarred Settings</h2>
  <label>GitHub PR Sidebar Shortcut:</label>
  <input type="text" id="shortcut" placeholder="Press a key..." readonly>
  <button id="save">Save</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
