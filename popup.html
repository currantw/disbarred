<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
    }
    .site-section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e1e4e8;
    }
    .site-section:last-child {
      border-bottom: none;
    }
    .site-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .site-icon {
      width: 20px;
      height: 20px;
      margin-right: 8px;
    }
    .site-name {
      font-weight: 600;
      font-size: 14px;
      color: #24292f;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .shortcut-label {
      flex: 1;
      font-size: 13px;
      color: #57606a;
    }
    input {
      width: 100px;
      padding: 6px 8px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
      caret-color: transparent;
    }
    input.recording {
      border-color: #0969da;
      background: #f6f8fa;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #0860ca;
    }
    button.primary {
      background: #0550ae;
    }
    button.primary:hover {
      background: #033d8b;
    }
    button.saved {
      background: #28a745;
    }
    button.saved:hover {
      background: #28a745;
    }
  </style>
</head>
<body>
  <h2>Disbarred Settings</h2>
  <div id="settings-container"></div>
  <button id="save">Save</button>
  <button id="save-close" class="primary">Save & Close</button>
  <script src="popup.js"></script>
</body>
</html>
